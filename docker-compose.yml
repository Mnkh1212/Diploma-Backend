services:
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-db
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack123
      POSTGRES_DB: fintrack
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  parser:
    build:
      context: ./parser_service
      dockerfile: Dockerfile
    container_name: fintrack-parser
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: fintrack
      DB_PASSWORD: fintrack123
      DB_NAME: fintrack
      JWT_SECRET: fintrack-diploma-secret-key-2024
      PORT: 8080
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
      PARSER_SERVICE_URL: http://parser:8000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      parser:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
